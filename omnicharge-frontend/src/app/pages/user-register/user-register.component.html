<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>⚡ OmniCharge</h1>
      <p>Create your account</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" [(ngModel)]="form.username" name="username"
               placeholder="3-30 chars, letters/numbers/underscores" required>
        <div class="error-text" *ngIf="fieldErrors['username']">{{ fieldErrors['username'] }}</div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" [(ngModel)]="form.email" name="email"
               placeholder="user@example.com" required>
        <div class="error-text" *ngIf="fieldErrors['email']">{{ fieldErrors['email'] }}</div>
      </div>
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" class="form-control" [(ngModel)]="form.fullName" name="fullName"
               placeholder="2-100 characters" required>
        <div class="error-text" *ngIf="fieldErrors['fullName']">{{ fieldErrors['fullName'] }}</div>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" class="form-control" [(ngModel)]="form.phone" name="phone"
               placeholder="10-digit Indian mobile (starts with 6-9)" required>
        <div class="error-text" *ngIf="fieldErrors['phone']">{{ fieldErrors['phone'] }}</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" [(ngModel)]="form.password" name="password"
               placeholder="Minimum 6 characters" required>
        <div class="error-text" *ngIf="fieldErrors['password']">{{ fieldErrors['password'] }}</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/user/login">Sign in</a></p>
      <p class="mt-1"><a routerLink="/home">← Back to Home</a></p>
    </div>
  </div>
</div>
