<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>⚡ OmniCharge</h1>
      <p>Admin Portal — Sign In</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" [(ngModel)]="username" name="username"
               placeholder="Enter admin username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" [(ngModel)]="password" name="password"
               placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Admin Sign In' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Need an admin account? <a routerLink="/admin/register">Create Admin</a></p>
      <p class="mt-1"><a routerLink="/home">← Back to Home</a></p>
    </div>
  </div>
</div>
