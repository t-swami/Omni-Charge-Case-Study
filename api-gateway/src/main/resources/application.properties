spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

jwt.secret=${JWT_SECRET}

# -------------------------------------------------------
# User Service Routes
# -------------------------------------------------------
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=user-service-users
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# -------------------------------------------------------
# Operator Service Routes
# -------------------------------------------------------
spring.cloud.gateway.routes[2].id=operator-service-operators
spring.cloud.gateway.routes[2].uri=lb://operator-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/operators/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[3].id=operator-service-plans
spring.cloud.gateway.routes[3].uri=lb://operator-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/plans/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

# -------------------------------------------------------
# Recharge Service Routes
# -------------------------------------------------------
spring.cloud.gateway.routes[4].id=recharge-service
spring.cloud.gateway.routes[4].uri=lb://recharge-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/recharge/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

# -------------------------------------------------------
# Payment Service Routes
# -------------------------------------------------------
spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/transactions/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# -------------------------------------------------------
# Swagger UI routes
# -------------------------------------------------------
spring.cloud.gateway.routes[6].id=user-service-swagger
spring.cloud.gateway.routes[6].uri=lb://user-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/user-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[7].id=operator-service-swagger
spring.cloud.gateway.routes[7].uri=lb://operator-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/operator-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/operator-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[8].id=recharge-service-swagger
spring.cloud.gateway.routes[8].uri=lb://recharge-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/recharge-service/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/recharge-service/v3/api-docs,/v3/api-docs

spring.cloud.gateway.routes[9].id=payment-service-swagger
spring.cloud.gateway.routes[9].uri=lb://payment-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/payment-service/v3/api-docs,/v3/api-docs

# -------------------------------------------------------
# Springdoc — aggregate all downstream services in one UI
# -------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Operator Service
springdoc.swagger-ui.urls[1].url=/operator-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Recharge Service
springdoc.swagger-ui.urls[2].url=/recharge-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Payment Service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs

# -------------------------------------------------------
# Actuator
# -------------------------------------------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Zipkin Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
